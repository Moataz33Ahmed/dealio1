<div class="profile-menu-backdrop" *ngIf="isOpen" (click)="onCloseMenu()"></div>
<div class="profile-menu-container" [class.open]="isOpen">
  <div class="profile-menu-header">
    <img src="https://placehold.co/60x60?text=Avatar" alt="profile" class="profile-avatar" />
    <div class="profile-info">
      <div class="profile-name">{{user.name}}</div>
      <div class="profile-phone">{{user.phone}}</div>
      <div class="profile-status">{{user.status}}</div>
    </div>
  </div>
  <div class="profile-menu-list">
    <!-- Listings Product -->
    <a class="menu-item" [routerLink]="['/listed-products']" (click)="onListingsProduct()">
      <span class="menu-icon">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="7" width="18" height="13" rx="2"/>
          <path d="M16 3v4"/>
          <path d="M8 3v4"/>
        </svg>
      </span>
      <span class="menu-label">Listings Product</span>
    </a>
    <!-- Orders -->
    <a class="menu-item" [routerLink]="['/orders']" (click)="onOrders()">
      <span class="menu-icon">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="9" cy="21" r="1"/>
          <circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
      </span>
      <span class="menu-label">Orders</span>
    </a>
    <!-- My Account -->
    <a class="menu-item" [routerLink]="['/user-information']" (click)="onMyAccount()">
      <span class="menu-icon">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="8" r="4"/>
          <path d="M6 20c0-2.2 3.1-4 6-4s6 1.8 6 4"/>
        </svg>
      </span>
      <span class="menu-label">My Account</span>
    </a>
    <!-- Logout -->
    <a class="menu-item logout" (click)="onLogout()">
      <span class="menu-icon">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M17 16l4-4m0 0l-4-4m4 4H9"/>
          <path d="M13 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8"/>
        </svg>
      </span>
      <span class="menu-label">Logout</span>
    </a>
  </div>
</div>
