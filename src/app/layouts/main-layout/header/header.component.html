<header class="premium-header">
  <div class="header-wrapper">
    <!-- Brand Section -->
    <div class="brand-section">
      <a routerLink="/" class="brand-link">
      <div class="brand-logo">
  <div class="logo-ring"></div>
  <span class="logo-icon">
    <!-- أيقونة شخصين يتصافحان -->
    <svg width="32" height="32" viewBox="0 0 44 44" fill="none" stroke="#4285f4" xmlns="http://www.w3.org/2000/svg">
      <g>
        <circle cx="14" cy="14" r="6" fill="#4285f4" stroke="#fff" stroke-width="1.5"/>
        <rect x="10" y="20" width="8" height="11" rx="4" fill="#e6edfe" stroke="#4285f4" stroke-width="1.5"/>
        <circle cx="30" cy="14" r="6" fill="#667eea" stroke="#fff" stroke-width="1.5"/>
        <rect x="26" y="20" width="8" height="11" rx="4" fill="#e9e7fe" stroke="#667eea" stroke-width="1.5"/>
        <path d="M18 28 C20 28, 22 26, 22 24" stroke="#10b981" stroke-width="2.3" fill="none" stroke-linecap="round"/>
        <path d="M22 24 C22 26, 24 28, 26 28" stroke="#10b981" stroke-width="2.3" fill="none" stroke-linecap="round"/>
        <circle cx="22" cy="24" r="2" fill="#fff" stroke="#10b981" stroke-width="1.2"/>
      </g>
    </svg>
  </span>
</div>
        <div class="brand-info">
          <span class="brand-name">Dealio</span>
          <span class="brand-tagline">Marketplace</span>
        </div>
      </a>
    </div>
    <!-- Search Zone -->
    <div class="search-zone">
      <div class="search-wrapper">
        <div class="search-field">
          <span class="search-icon">
            <svg width="24" height="24" stroke="#2563eb" fill="none" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </span>
          <input 
            type="text"
            #searchInput
            placeholder="Discover amazing products..."
            class="search-input">
        </div>
        <button 
          class="search-btn" title="Search">
          <svg width="24" height="24" stroke="#2563eb" fill="none" stroke-width="2" viewBox="0 0 24 24">
            <polyline points="9 6 15 12 9 18"/>
          </svg>
        </button>
      </div>
    </div>
    <!-- Navigation Hub -->
    <nav class="nav-hub">
      <div class="nav-links">
        <a routerLink="/" routerLinkActive="nav-active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
          <div class="nav-content">
            <span class="nav-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" stroke="#2563eb" fill="none" stroke-width="2">
                <path d="M3 12l9-9 9 9"/>
                <path d="M9 21V13h6v8"/>
              </svg>
            </span>
            <span class="nav-label">Home</span>
          </div>
          <div class="nav-indicator"></div>
        </a>
        <a routerLink="/marketplace" routerLinkActive="nav-active" class="nav-item">
          <div class="nav-content">
            <span class="nav-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" stroke="#2563eb" fill="none" stroke-width="2">
                <rect x="3" y="7" width="18" height="13" rx="2"/>
                <path d="M16 3v4"/>
                <path d="M8 3v4"/>
              </svg>
            </span>
            <span class="nav-label">Marketplace</span>
          </div>
          <div class="nav-indicator"></div>
        </a>
        <button (click)="onBecomeSellerClick()" class="nav-item nav-button">
          <div class="nav-content">
            <span class="nav-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" stroke="#16a34a" fill="none" stroke-width="2">
                <circle cx="17" cy="10" r="2"/>
                <path d="M7 17v-3a3 3 0 0 1 3-3h4"/>
                <path d="M7 17v2a2 2 0 0 0 2 2h7a2 2 0 0 0 2-2v-2"/>
              </svg>
            </span>
            <span class="nav-label">Sell your Products</span>
          </div>
          <div class="nav-indicator"></div>
        </button>
      </div>
    </nav>
    <!-- Action Center -->
    <div class="action-center">
      <button
        class="action-btn orders-btn"
        title="Orders"
        (click)="onOrdersClick()">
        <span>
          <svg width="22" height="22" viewBox="0 0 24 24" stroke="#2563eb" fill="none" stroke-width="2">
            <circle cx="9" cy="21" r="1"/>
            <circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
        </span>
      </button>
      <button class="action-btn notifications-btn" title="Notifications">
        <span>
          <svg width="20" height="20" viewBox="0 0 24 24" stroke="#f59e42" fill="none" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            <path d="M2 8a6 6 0 0 1 20 0"/>
          </svg>
        </span>
      </button>
      <div class="auth-section" *ngIf="!isLoggedIn">
        <button (click)="onLogin()" class="auth-btn login-btn">
          <span>Login</span>
        </button>
        <button (click)="onSignUp()" class="auth-btn signup-btn">
          <span>Join Now</span>
        </button>
      </div>
      <button *ngIf="isLoggedIn"
        class="action-btn"
        style="margin-right: 2px;"
        title="Profile Menu"
        (click)="toggleProfileMenu()">
        <span>
          <svg width="24" height="24" viewBox="0 0 24 24" stroke="#2563eb" fill="none" stroke-width="2">
            <circle cx="12" cy="8" r="4"/>
            <path d="M6 20c0-2.2 3.1-4 6-4s6 1.8 6 4"/>
          </svg>
        </span>
      </button>
    </div>
    <app-profile-menu
      [isOpen]="profileMenuOpen"
      [user]="user"
      (logout)="onLogout()"
      (closeMenu)="closeProfileMenu()"
    ></app-profile-menu>
    <div *ngIf="showAlert" class="auto-hide-alert">
      <span class="alert-message">
        You must login first to perform this action.
      </span>
    </div>
  </div>
</header>
