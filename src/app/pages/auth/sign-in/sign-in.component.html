<div class="sign-in-container">
  <form class="sign-in-form" (ngSubmit)="onSubmit()" #formRef="ngForm" autocomplete="on" novalidate>
    <h2>Sign In</h2>
    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" name="email" [(ngModel)]="email" #emailRef="ngModel"
             placeholder="Email" autocomplete="email" required email />
      <div class="error" *ngIf="emailRef.invalid && (emailRef.dirty || emailRef.touched)">
        <span *ngIf="emailRef.errors?.['required']">Email is required</span>
        <span *ngIf="emailRef.errors?.['email']">Invalid email</span>
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" name="password" [(ngModel)]="password" #passwordRef="ngModel"
             placeholder="Password" autocomplete="current-password" required />
      <div class="error" *ngIf="passwordRef.invalid && (passwordRef.dirty || passwordRef.touched)">
        <span *ngIf="passwordRef.errors?.['required']">Password is required</span>
      </div>
    </div>

    <button type="submit" [disabled]="formRef.invalid || loading">
      {{ loading ? 'Signing In...' : 'Sign In' }}
    </button>

    <div class="api-error" *ngIf="apiError">{{ apiError }}</div>
  </form>
</div>
